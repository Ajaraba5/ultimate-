<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Registrador - Sistema Electoral v3.0.0</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="description" content="Panel de usuario registrador del Sistema Electoral">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body style="background: #F5F7FA;">
    <!-- Navbar -->
    <div class="navbar">
        <div class="navbar-brand">
            📊 Panel de Registrador
        </div>
        <div class="navbar-user">
            <span id="userName">Cargando...</span>
            <button class="btn btn-danger" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Personas -->
        <div class="card">
            <div class="card-header">🪪 Documentos de la Base de Datos</div>
            <div class="card-body">
                <!-- Filtros y Búsqueda -->
                <div class="row mb-2">
                    <div class="col-12">
                        <div class="input-group">
                            <input type="text" id="searchInput" placeholder="Buscar por cédula...">
                            <button class="btn btn-primary" onclick="loadMisPersonas()">🔍 Buscar</button>
                        </div>
                    </div>
                </div>

                <!-- Desmarcar información -->
                <div class="alert alert-info mb-2">
                    💡 <strong>Importante:</strong> Busca por cédula y marca voto desde la tabla.
                </div>

                <!-- Tabla de Personas -->
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Cédula</th>
                                <th>Lugar de Votación</th>
                                <th>Mesa</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="personasTableBody">
                            <tr><td colspan="4" class="text-center">Cargando datos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let socket = null;
        let isSubmittingAction = false;

        window.addEventListener('load', async () => {
            await checkAuth();
            await loadMisPersonas();
            initializeWebSocket();

            document.getElementById('searchInput').addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    loadMisPersonas();
                }
            });
        });

        async function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (!token || user.role !== 'contador') {
                window.location.href = '/';
                return;
            }

            document.getElementById('userName').textContent = user.nombreCompleto || user.username;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            if (socket) socket.disconnect();
            window.location.href = '/';
        }

        async function loadMisPersonas() {
            try {
                const search = document.getElementById('searchInput').value;

                const params = new URLSearchParams();
                if (search) params.append('search', search);

                const response = await apiCall(`/api/contador/personas?${params}`);
                if (response.success) {
                    const tbody = document.getElementById('personasTableBody');
                    
                    if (response.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="text-center">No se encontraron votantes</td></tr>';
                        return;
                    }

                    tbody.innerHTML = response.data.map(persona => `
                        <tr style="${persona.voto ? 'background: #E8F8F5;' : ''}">
                            <td>${persona.documento}</td>
                            <td>${persona.lugar_votacion_nombre || '-'}</td>
                            <td>${persona.mesa || '-'}</td>
                            <td>
                                ${!persona.voto 
                                    ? `<button class="btn btn-success" onclick="marcarVoto(${persona.id}, this)">✅ Marcar Voto</button>`
                                    : `<span class="badge badge-success">✅ Votó</span>`}
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading personas:', error);
            }
        }

        async function marcarVoto(personaId, buttonElement) {
            if (isSubmittingAction) return;

            const endpoint = '/api/contador/marcar-voto';
            isSubmittingAction = true;
            const originalButtonText = buttonElement ? buttonElement.innerHTML : '';

            if (buttonElement) {
                buttonElement.disabled = true;
                buttonElement.innerHTML = '⏳ Marcando...';
            }

            try {
                const response = await apiCall(endpoint, {
                    method: 'POST',
                    body: JSON.stringify({ personaId })
                });

                const message = String(response?.message || '').toLowerCase();
                const alreadyInExpectedState = message.includes('ya votó');

                if (response.success || alreadyInExpectedState) {
                    const row = buttonElement?.closest('tr');
                    const tbody = document.getElementById('personasTableBody');

                    if (row) {
                        row.remove();
                    }

                    if (tbody && tbody.children.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="text-center">No se encontraron votantes</td></tr>';
                    }

                    if (socket && socket.connected) {
                        socket.emit('voto-marcado', { personaId });
                    }
                } else {
                    if (buttonElement) {
                        buttonElement.disabled = false;
                        buttonElement.innerHTML = originalButtonText;
                    }
                    alert(`❌ ${response.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                if (buttonElement) {
                    buttonElement.disabled = false;
                    buttonElement.innerHTML = originalButtonText;
                }
                alert('❌ Error al procesar la acción');
            } finally {
                isSubmittingAction = false;
            }
        }

        function initializeWebSocket() {
            const token = localStorage.getItem('token');
            socket = io(API_URL, {
                auth: { token }
            });

            socket.on('connect', () => {
                console.log('✅ WebSocket conectado');
            });

            socket.on('asignacion-actualizada', (data) => {
                console.log('📢 Asignación actualizada:', data);
                loadMisPersonas();
                alert(data.mensaje);
            });

            socket.on('disconnect', () => {
                console.log('❌ WebSocket desconectado');
            });
        }

        async function apiCall(endpoint, options = {}) {
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });

            return response.json();
        }
    </script>
</body>
</html>
