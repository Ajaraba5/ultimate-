<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Registrador - Sistema Electoral v3.0.0</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="description" content="Panel de usuario registrador del Sistema Electoral">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body style="background: #F5F7FA;">
    <!-- Navbar -->
    <div class="navbar">
        <div class="navbar-brand">
            📊 Panel de Registrador
        </div>
        <div class="navbar-user">
            <span id="userName">Cargando...</span>
            <button class="btn btn-danger" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Mis Personas -->
        <div class="card">
            <div class="card-header">🪪 Documentos Asignados</div>
            <div class="card-body">
                <!-- Filtros y Búsqueda -->
                <div class="row mb-2">
                    <div class="col-12">
                        <div class="input-group">
                            <input type="text" id="searchInput" placeholder="Buscar por documento...">
                            <button class="btn btn-primary" onclick="loadMisPersonas()">🔍 Buscar</button>
                        </div>
                    </div>
                </div>

                <!-- Desmarcar información -->
                <div class="alert alert-info mb-2">
                    💡 <strong>Importante:</strong> Solo se muestra el documento. Usa el botón "Marcar Voto" para registrar que la persona ya votó.
                </div>

                <!-- Tabla de Personas -->
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Documento</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="personasTableBody">
                            <tr><td colspan="2" class="text-center">Cargando documentos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmación -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Confirmar Acción</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modalMessage"></p>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-success" id="modalConfirmBtn" onclick="confirmAction()">✅ Confirmar</button>
                    <button class="btn btn-secondary" onclick="closeModal()">❌ Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let socket = null;
        let currentAction = null;
        let isSubmittingAction = false;

        window.addEventListener('load', async () => {
            await checkAuth();
            await loadMisPersonas();
            initializeWebSocket();
        });

        async function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (!token || user.role !== 'contador') {
                window.location.href = '/';
                return;
            }

            document.getElementById('userName').textContent = user.nombreCompleto || user.username;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            if (socket) socket.disconnect();
            window.location.href = '/';
        }

        async function loadMisPersonas() {
            try {
                const search = document.getElementById('searchInput').value;

                const params = new URLSearchParams();
                if (search) params.append('search', search);

                const response = await apiCall(`/api/contador/personas?${params}`);
                if (response.success) {
                    const tbody = document.getElementById('personasTableBody');
                    
                    if (response.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="2" class="text-center">No tienes documentos asignados</td></tr>';
                        return;
                    }

                    tbody.innerHTML = response.data.map(persona => `
                        <tr style="${persona.voto ? 'background: #E8F8F5;' : ''}">
                            <td>${persona.documento}</td>
                            <td>
                                ${!persona.voto 
                                    ? `<button class="btn btn-success" onclick="mostrarConfirmacionMarcar(${persona.id}, '${persona.documento}')">✅ Marcar Voto</button>`
                                    : `<span class="badge badge-success">✅ Votó</span>`}
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading personas:', error);
            }
        }

        function mostrarConfirmacionMarcar(personaId, nombre) {
            document.getElementById('modalTitle').textContent = 'Marcar Voto';
            document.getElementById('modalMessage').textContent = `¿Confirmas que el documento ${nombre} ya votó?`;
            document.getElementById('confirmModal').classList.add('active');

            currentAction = {
                type: 'marcar',
                personaId: personaId,
                nombre: nombre
            };
        }

        async function confirmAction() {
            if (!currentAction || isSubmittingAction) return;

            const endpoint = '/api/contador/marcar-voto';

            const actionSnapshot = { ...currentAction };
            const confirmBtn = document.getElementById('modalConfirmBtn');
            isSubmittingAction = true;
            confirmBtn.disabled = true;

            try {
                const response = await apiCall(endpoint, {
                    method: 'POST',
                    body: JSON.stringify({ personaId: actionSnapshot.personaId })
                });

                const message = String(response?.message || '').toLowerCase();
                const alreadyInExpectedState = message.includes('ya votó');

                if (response.success || alreadyInExpectedState) {
                    closeModal();
                    await loadMisPersonas();

                    if (socket && socket.connected) {
                        socket.emit('voto-marcado', { personaId: actionSnapshot.personaId });
                    }

                    alert('✅ Voto marcado exitosamente!');
                } else {
                    alert(`❌ ${response.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error al procesar la acción');
            } finally {
                isSubmittingAction = false;
                confirmBtn.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            currentAction = null;
        }

        function initializeWebSocket() {
            const token = localStorage.getItem('token');
            socket = io(API_URL, {
                auth: { token }
            });

            socket.on('connect', () => {
                console.log('✅ WebSocket conectado');
            });

            socket.on('asignacion-actualizada', (data) => {
                console.log('📢 Asignación actualizada:', data);
                loadMisPersonas();
                alert(data.mensaje);
            });

            socket.on('disconnect', () => {
                console.log('❌ WebSocket desconectado');
            });
        }

        async function apiCall(endpoint, options = {}) {
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });

            return response.json();
        }
    </script>
</body>
</html>
