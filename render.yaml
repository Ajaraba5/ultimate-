services:
  - type: web
    name: electoral-system
    env: node
    plan: starter
    buildCommand: npm install
    preDeployCommand: npm run setup-db:safe
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOW_EXTERNAL_ACCESS
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: BCRYPT_ROUNDS
        value: 12
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: electoral-db
    plan: starter
    databaseName: electoral_system
    user: electoral_user
